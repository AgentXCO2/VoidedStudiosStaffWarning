<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b12;
  color:white;
}

section {
  padding:20px;
}

input, button {
  padding:10px;
  margin:5px;
}

button {
  background:#ff4d4d;
  border:none;
  color:white;
  border-radius:6px;
}
</style>
</head>

<body>

<section>

<h2>🛠️ Admin Panel</h2>

<input id="to" placeholder="Username"><br>
<input id="msg" placeholder="Message"><br>

<button onclick="send()">Send</button>
<button onclick="logout()">Logout</button>

</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getAuth,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJ9-hLzsxyHsnxHNnohbl7uI4gCa8ELjk",
  authDomain: "voided-studios-core.firebaseapp.com",
  projectId: "voided-studios-core"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* 📤 SEND MESSAGE (TARGET USERNAME) */
window.send = async () => {
  await addDoc(collection(db,"messages"), {
    to: to.value,
    message: msg.value,
    time: Date.now()
  });

  alert("Sent to " + to.value);
};

/* 🚪 LOGOUT */
window.logout = () => {
  signOut(auth);
};

</script>

</body>
</html>
